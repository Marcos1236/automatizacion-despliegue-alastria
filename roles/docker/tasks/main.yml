---
- name: Añadir la clave GPG oficial de Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  become: yes

- name: Añadir el repositorio de Docker a las fuentes de APT
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
    state: present
  become: yes

- name: Instalar Docker y Docker Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes
  become: yes

- name: Asegurar que Docker está iniciado y habilitado en el arranque
  service:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Añadir el usuario al grupo docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  become: yes